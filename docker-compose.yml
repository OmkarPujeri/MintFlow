# Local dev infrastructure for MintFlow (Postgres + Redis).
# Values match backend/.env. Start with:  docker compose up -d
services:
  postgres:
    image: postgres:16
    container_name: mintflow-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: mintflow_db
    ports:
      - "5432:5432"
    volumes:
      - mintflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: mintflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mintflow_pgdata:
