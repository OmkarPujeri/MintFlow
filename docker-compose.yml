# Full local stack for MintFlow (Postgres + Redis + API).
# Requires a root .env (see .env.example) with POSTGRES_PASSWORD and SECRET_KEY.
# Start everything with:  docker compose up -d --build
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mintflow-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Inside the compose network the DB/Redis hosts are the service names.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mintflow_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-False}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    # Apply migrations, then start the API under Gunicorn (multi-worker).
    command: sh -c "cd /app && alembic upgrade head && cd /app/backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"


  postgres:
    image: postgres:16
    container_name: mintflow-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Set POSTGRES_PASSWORD in a local .env file (see .env.example).
      # Only applied when the volume is first created.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mintflow_db}
    ports:
      - "5432:5432"
    volumes:
      - mintflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: mintflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mintflow_pgdata:
